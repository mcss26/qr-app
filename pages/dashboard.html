<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' ws: wss: https://iyknbgmcnbpvalvsjxjz.supabase.co;
      img-src 'self' data:;
      font-src 'self';
      frame-src 'none';">
  <title>QR Gate — Panel</title>
  <meta name="theme-color" content="#0a0a0a">

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="../assets/js/core/config.js"></script>
  <script defer src="../assets/js/core/supabase-client.js"></script>
  <script defer src="../assets/js/core/auth.js"></script>
  <script defer src="../assets/js/core/toast.js"></script>
  <script defer src="../assets/js/modules/dashboard.js?v=2.0"></script>
</head>

<body>
  <!-- Top Bar (CMS Standard) -->
  <header class="topbar">
    <div class="topbar-start">
      <nav class="breadcrumb" aria-label="Navegación de migas">
        <span class="breadcrumb-item current">QR GATE / PANEL</span>
      </nav>
    </div>
    <!-- No indicator needed as per user request -->
    <div class="topbar-end">
      <div class="dropdown-container">
        <button class="avatar avatar-sm" id="btnLogout" aria-label="Cerrar sesión" title="Cerrar sesión">AD</button>
      </div>
    </div>
  </header>

  <main class="page-content dashboard-content">
    <!-- Stats (Hero KPI) -->
    <div class="hero-zone-dashboard">
      <div class="scan-label hero-scan-label">Total Acreditados</div>
      <div class="scan-count giant-counter" id="statScanned">—</div>
      <span class="status-badge idle ghost-glass-badge hero-refresh-badge" id="refreshBadge">
        <span class="live-dot"></span>
        <span id="refreshText">Actualización en vivo</span>
      </span>
    </div>

    <!-- Navigation -->
    <div class="nav-grid nav-grid-single">
      <a href="scanner.html" class="nav-card" id="navScanner">
        <div class="nav-card-icon nav-card-icon-lg">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"/><rect x="9" y="9" width="6" height="6"/></svg>
        </div>
        <div class="nav-card-label nav-card-label-lg">Ir al Contador</div>
      </a>
    </div>

    <!-- Danger Zone -->
    <hr class="section-divider danger-zone-divider" />
    <button id="btnClear" class="btn btn-danger btn-full btn-lg btn-danger-lg">Reiniciar a Cero (Nueva Jornada)</button>
  </main>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">¿Reiniciar Contador?</h3>
      <p id="modalMsg">Esta acción reiniciará el contador de la puerta a 0 para una nueva jornada. Todos los dispositivos se sincronizarán a 0. No se puede deshacer.</p>
      <div class="modal-actions modal-actions-dashboard">
        <button id="modalCancel" class="btn btn-ghost">Cancelar</button>
        <button id="modalConfirm" class="btn btn-danger">Sí, Reiniciar a 0</button>
      </div>
    </div>
  </div>
</body>

</html>
