<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' ws: wss: https://iyknbgmcnbpvalvsjxjz.supabase.co;
      img-src 'self' data:;
      font-src 'self';
      frame-src 'none';">
  <title>QR Gate — Panel</title>
  <meta name="theme-color" content="#0a0a0a">

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="../assets/js/core/config.js"></script>
  <script defer src="../assets/js/core/supabase-client.js"></script>
  <script defer src="../assets/js/core/auth.js"></script>
  <script defer src="../assets/js/core/toast.js"></script>
  <script defer src="../assets/js/modules/dashboard.js?v=2.0"></script>
</head>

<body>
  <!-- Top Bar (CMS Standard) -->
  <header class="topbar">
    <div class="topbar-start">
      <nav class="breadcrumb" aria-label="Navegación de migas">
        <span class="breadcrumb-item current">QR GATE / PANEL</span>
      </nav>
    </div>
    <!-- No indicator needed as per user request -->
    <div class="topbar-end">
      <div class="dropdown-container">
        <button class="avatar avatar-sm" id="btnLogout" aria-label="Cerrar sesión" title="Cerrar sesión">AD</button>
      </div>
    </div>
  </header>

  <main class="page-content">
    <!-- Stats (CMS Standard) -->
    <div class="summary-metrics-container">
      <div class="summary-metrics-grid" style="grid-template-columns: 1fr;">
        <div class="summary-metric-card border-l-costs" style="text-align: center; padding: 32px;">
          <div class="summary-metric-label" style="font-size: 1.2rem;">Total Ingresos</div>
          <div class="summary-metric-value" id="statScanned" style="font-size: 3rem; margin-top: 8px;">—</div>
        </div>
      </div>
    </div>

    <!-- Auto-refresh indicator -->
    <div style="text-align: center; margin-bottom: 24px;">
      <span class="status-badge idle" id="refreshBadge">
        <span class="live-dot"></span>
        <span id="refreshText">Actualización en vivo</span>
      </span>
    </div>

    <!-- Navigation -->
    <div class="nav-grid">
      <a href="generator.html" class="nav-card" id="navGenerator">
        <div class="nav-card-icon">🎫</div>
        <div class="nav-card-label">Generar QRs</div>
      </a>
      <a href="scanner.html" class="nav-card" id="navScanner">
        <div class="nav-card-icon">📷</div>
        <div class="nav-card-label">Escanear</div>
      </a>
    </div>

    <!-- Danger Zone -->
    <hr class="section-divider" />
    <button id="btnClear" class="btn btn-danger btn-full btn-lg">🗑 Limpiar Base / Nueva Fecha</button>
  </main>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">¿Estás seguro?</h3>
      <p id="modalMsg">Esta acción borrará todos los códigos QR generados. No se puede deshacer.</p>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-ghost">Cancelar</button>
        <button id="modalConfirm" class="btn btn-danger">Sí, Limpiar Todo</button>
      </div>
    </div>
  </div>
</body>

</html>
