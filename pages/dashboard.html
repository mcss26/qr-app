<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' ws: wss: https://iyknbgmcnbpvalvsjxjz.supabase.co;
      img-src 'self' data:;
      font-src 'self';
      frame-src 'none';">
  <title>QR Gate — Panel</title>
  <meta name="theme-color" content="#0a0a0a">

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="../assets/js/core/config.js"></script>
  <script defer src="../assets/js/core/supabase-client.js"></script>
  <script defer src="../assets/js/core/auth.js"></script>
  <script defer src="../assets/js/core/toast.js"></script>
  <script defer src="../assets/js/modules/dashboard.js"></script>
</head>

<body>
  <!-- Top Bar -->
  <nav class="topbar">
    <a href="dashboard.html" class="topbar-brand">QR GATE <span>/ Panel</span></a>
    <div class="topbar-actions">
      <button id="btnLogout" class="btn btn-ghost btn-icon" title="Cerrar sesión">⏻</button>
    </div>
  </nav>

  <main class="page-content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Generados</div>
      </div>
      <div class="stat-card accent-success">
        <div class="stat-value" id="statScanned">—</div>
        <div class="stat-label">Escaneados</div>
      </div>
      <div class="stat-card accent-warning">
        <div class="stat-value" id="statPending">—</div>
        <div class="stat-label">Pendientes</div>
      </div>
    </div>

    <!-- Auto-refresh indicator -->
    <div style="text-align: center; margin-bottom: 24px;">
      <span class="status-badge idle" id="refreshBadge">
        <span class="live-dot"></span>
        <span id="refreshText">Actualización en vivo</span>
      </span>
    </div>

    <!-- Navigation -->
    <div class="nav-grid">
      <a href="generator.html" class="nav-card" id="navGenerator">
        <div class="nav-card-icon">🎫</div>
        <div class="nav-card-label">Generar QRs</div>
      </a>
      <a href="scanner.html" class="nav-card" id="navScanner">
        <div class="nav-card-icon">📷</div>
        <div class="nav-card-label">Escanear</div>
      </a>
    </div>

    <!-- Danger Zone -->
    <hr class="section-divider" />
    <button id="btnClear" class="btn btn-danger btn-full btn-lg">🗑 Limpiar Base / Nueva Fecha</button>
  </main>

  <!-- Confirm Modal -->
  <div class="modal-backdrop" id="confirmModal">
    <div class="modal-box">
      <h3 id="modalTitle">¿Estás seguro?</h3>
      <p id="modalMsg">Esta acción borrará todos los códigos QR generados. No se puede deshacer.</p>
      <div class="modal-actions">
        <button id="modalCancel" class="btn btn-ghost">Cancelar</button>
        <button id="modalConfirm" class="btn btn-danger">Sí, Limpiar Todo</button>
      </div>
    </div>
  </div>
</body>

</html>
