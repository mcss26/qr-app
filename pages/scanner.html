<body class="scanner-mode">
  <!-- Top Navigation Floating -->
  <div class="scanner-header">
    <a href="dashboard.html" class="btn btn-ghost btn-icon nav-back-btn" aria-label="Volver">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    
    <div class="status-badge idle ghost-glass-badge" id="statusBadge">
      <span id="statusIcon">MANUAL</span>
      <span id="statusText">Contador Activo</span>
    </div>
  </div>

  <main class="scanner-main">

    <!-- Bottom Half (Counter & Manual Button) -->
    <div class="scanner-counter-section">
      <div class="counter-display">
        <div class="scan-label">Acreditados</div>
        <div class="scan-count giant-counter" id="scanCount">0</div>
      </div>
      <button type="button" id="btnManualPlus" class="btn btn-success giant-btn">
        +1 MANUAL
      </button>
    </div>
  </main>
