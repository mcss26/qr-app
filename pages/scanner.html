<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
      script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com;
      style-src 'self' 'unsafe-inline';
      connect-src 'self' ws: wss: https://iyknbgmcnbpvalvsjxjz.supabase.co;
      img-src 'self' data: blob:;
      font-src 'self';
      frame-src 'none';
      media-src 'self' blob:;">
  <title>QR Gate — Escanear</title>
  <meta name="theme-color" content="#0a0a0a">

  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/app.css" />

  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script defer src="../assets/js/core/config.js"></script>
  <script defer src="../assets/js/core/supabase-client.js"></script>
  <script defer src="../assets/js/core/auth.js"></script>
  <script defer src="../assets/js/core/toast.js"></script>
  <script defer src="../assets/js/modules/scanner.js?v=1.3"></script>
</head>

<body class="scanner-mode">
  <!-- Top Navigation Floating -->
  <div class="scanner-header">
    <a href="dashboard.html" class="btn btn-ghost btn-icon" style="border:none; background:var(--bg-elevated); width:40px; height:40px; border-radius:50%;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
    
    <div class="status-badge idle" id="statusBadge" style="margin-bottom:0; background:var(--bg-elevated); border: 1px solid var(--border-subtle); backdrop-filter: blur(8px);">
      <span id="statusIcon">RDY</span>
      <span id="statusText">Listo para escanear</span>
    </div>

    <!-- Flash Toggle Button -->
    <button id="btnFlash" class="btn btn-ghost btn-icon" style="border:none; background:var(--bg-elevated); width:40px; height:40px; border-radius:50%; transition: color 0.2s;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </button>
  </div>

  <main class="scanner-main">
    <!-- Camera Viewport (Cinematic Full Bleed) - Temporarily hidden -->
    <div class="scanner-viewport-wrapper" style="display: none;">
      <div id="reader"></div>
      
      <!-- CSS Reticle -->
      <div class="scanner-reticle" id="reticle">
        <div class="scanner-reticle-corner scanner-reticle-tl"></div>
        <div class="scanner-reticle-corner scanner-reticle-tr"></div>
        <div class="scanner-reticle-corner scanner-reticle-bl"></div>
        <div class="scanner-reticle-corner scanner-reticle-br"></div>
        <!-- La animación láser fue removida para ahorrar batería -->
      </div>
    </div>

    <!-- Bottom Half (Counter & Manual Button) -->
    <div class="scanner-counter-section" style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; background: var(--bg-base); flex: 1;">
      <div class="counter-display" style="text-align: center; margin-bottom: 2rem;">
        <div class="scan-label" style="font-size: 1.5rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px;">Acreditados</div>
        <div class="scan-count giant-counter" id="scanCount" style="font-size: 6rem; font-weight: 800; line-height: 1; color: var(--text-base);">0</div>
      </div>
      <button type="button" id="btnManualPlus" class="btn btn-primary giant-btn" style="width: 100%; padding: 1.5rem; font-size: 2rem; font-weight: 700; border-radius: 12px; background: var(--success-base); color: #000; border: none; cursor: pointer; text-transform: uppercase;">
        +1 MANUAL
      </button>
    </div>
  </main>

  <!-- Cinematic Result Overlay -->
  <div class="scan-overlay" id="scanOverlay">
    <div class="scan-overlay-card">
      <div class="scan-overlay-icon" id="overlayIcon"></div>
      <div class="scan-overlay-title" id="overlayTitle"></div>
      <div class="scan-overlay-msg" id="overlayMsg"></div>
    </div>
  </div>
</body>

</html>
